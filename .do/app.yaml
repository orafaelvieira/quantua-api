name: quantua-api
region: nyc

services:
  - name: api
    github:
      repo: orafaelvieira/quantua-api
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build && npx prisma generate
    run_command: npm start
    http_port: 3001
    # Bump basic-xxs → basic-xs (1GB RAM): Puppeteer + @sparticuz/chromium
    # consome ~150-300MB de RAM em pico de render (fricção #8). xxs (512MB)
    # ficava apertado e podia OOM.
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: https://walrus-app-bizfv.ondigitalocean.app
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_REGION
        scope: RUN_TIME
        value: nyc3
      - key: SPACES_BUCKET
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: JOBS_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: JOBS_TZ
        scope: RUN_TIME
        value: America/Sao_Paulo
      - key: ADMIN_TRIGGER_TOKEN
        scope: RUN_TIME
        type: SECRET
      # E-mail (Resend). Requer domínio quantua.com.br verificado no Resend
      # para entregar a destinatários externos; enquanto não, use EMAIL_FROM
      # com onboarding@resend.dev (entrega só ao dono da conta).
      - key: EMAIL_PROVIDER
        scope: RUN_TIME
        value: resend
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_FROM
        scope: RUN_TIME
        value: Quantua <nao-responda@quantua.com.br>
      - key: TEAM_INBOX_EMAIL
        scope: RUN_TIME
        value: emerson@valoo.com.br,giovanni@valoo.com.br,rafael@manzoti.com,jorge@valoo.com.br
    routes:
      - path: /
