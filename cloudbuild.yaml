# CI/CD GCP — trigger on-push-main (substitui o auto-deploy do DO App Platform).
# O deploy só passa --image: demais configs do serviço (secrets, envs, min/max
# instances, Cloud SQL) ficam preservadas da revisão anterior.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - southamerica-east1-docker.pkg.dev/quantua/quantua/quantua-api:$COMMIT_SHA
      - -t
      - southamerica-east1-docker.pkg.dev/quantua/quantua/quantua-api:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - southamerica-east1-docker.pkg.dev/quantua/quantua/quantua-api
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - quantua-api
      - --image=southamerica-east1-docker.pkg.dev/quantua/quantua/quantua-api:$COMMIT_SHA
      - --region=southamerica-east1
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
