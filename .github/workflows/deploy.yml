# Deploy automático no push em main (substitui o auto-deploy do DO App Platform).
# Auth sem segredos: OIDC do GitHub → Workload Identity Federation do GCP.
name: Deploy API (Cloud Run)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency: deploy-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/354808361877/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deploy@quantua.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build e push da imagem
        run: |
          gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet
          IMAGE=southamerica-east1-docker.pkg.dev/quantua/quantua/quantua-api:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      # Só --image: secrets, envs, Cloud SQL e min/max instances ficam
      # preservados da revisão anterior do serviço.
      - name: Deploy Cloud Run
        run: >-
          gcloud run deploy quantua-api
          --image=southamerica-east1-docker.pkg.dev/quantua/quantua/quantua-api:${{ github.sha }}
          --region=southamerica-east1
